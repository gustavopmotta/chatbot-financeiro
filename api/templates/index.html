<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FashionFlow · Financeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink:     #1a1018;
      --cream:   #f5f0e8;
      --warm:    #ede5d0;
      --blush:   #e8c4b0;
      --rose:    #c9856a;
      --deep:    #7a3b2e;
      --sage:    #6b8c6e;
      --alert:   #c4793a;
      --surface: #faf7f2;
      --border:  rgba(26,16,24,.10);
      --shadow:  0 4px 32px rgba(26,16,24,.10);
      --r:       16px;
    }
    html, body { height: 100%; color: var(--ink); background: var(--cream); font-family: 'DM Sans', sans-serif; }

    /* ── Layout ── */
    .shell {
      display: grid;
      margin: 0 auto;
      max-width: 1100px;
      grid-template-rows: 100vh;
      grid-template-columns: 280px 1fr;
      box-shadow: 0 0 80px rgba(26,16,24,.15);
    }

    /* ── Sidebar ── */
    .sidebar {
      overflow: hidden;
      position: relative;
      color: var(--cream);
      padding: 2rem 1.5rem;
      background: var(--ink);
      display: flex;
      flex-direction: column;
    }
    .sidebar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 80%, rgba(201,133,106,.2) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(107,140,110,.12) 0%, transparent 50%);
      pointer-events: none;
    }
    .brand { margin-bottom: 2.5rem; }
    .brand-tag { font-size: .65rem; color: var(--blush); margin-bottom: .4rem; letter-spacing: .18em; text-transform: uppercase; }
    .brand-name { line-height: 1; font-size: 1.9rem; color: var(--cream); font-family: 'DM Serif Display', serif; }
    .brand-name em { font-style: italic; color: var(--blush); }
    .brand-sector {
      font-size: .72rem; margin-top: .5rem; color: var(--rose);
      letter-spacing: .1em; text-transform: uppercase;
      display: flex; align-items: center; gap: .4rem;
    }
    .brand-sector::before { content: ''; display: inline-block; background: var(--rose); width: 20px; height: 1px; }
    .sidebar-sep { height: 1px; margin: 1.5rem 0; background: rgba(245,240,232,.08); }
    .quick-title { font-size: .6rem; margin-bottom: .8rem; letter-spacing: .15em; text-transform: uppercase; color: rgba(245,240,232,.4); }
    .quick-list { display: flex; list-style: none; flex-direction: column; gap: .35rem; }
    .quick-list li button {
      width: 100%; cursor: pointer; text-align: left; font-size: .78rem;
      border-radius: 8px; transition: all .18s; padding: .55rem .85rem;
      color: rgba(245,240,232,.75); font-family: 'DM Sans', sans-serif;
      background: rgba(245,240,232,.05); border: 1px solid rgba(245,240,232,.08);
      display: flex; align-items: center; gap: .5rem;
    }
    .quick-list li button:hover { color: var(--cream); transform: translateX(3px); background: rgba(201,133,106,.18); border-color: rgba(201,133,106,.3); }
    .quick-list li button .qi { flex-shrink: 0; font-size: 1rem; }
    .sidebar-bottom { margin-top: auto; }
    .reset-btn {
      width: 100%; padding: .7rem; cursor: pointer; font-size: .72rem;
      border-radius: 8px; transition: all .2s; letter-spacing: .06em;
      background: transparent; color: rgba(245,240,232,.45);
      font-family: 'DM Sans', sans-serif; border: 1px solid rgba(245,240,232,.12);
    }
    .reset-btn:hover { color: var(--rose); border-color: rgba(201,133,106,.4); }
    .status-dot { font-size: .7rem; margin-bottom: .75rem; color: rgba(245,240,232,.35); display: flex; align-items: center; gap: .5rem; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--sage); animation: pulse 2s infinite; box-shadow: 0 0 6px var(--sage); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    /* ── Chat area ── */
    .chat-area { display: flex; flex-direction: column; background: var(--surface); height: 100%; }
    .chat-header {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.1rem 1.5rem; border-bottom: 1px solid var(--border);
      background: #fff; flex-shrink: 0;
    }
    .chat-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--rose), var(--deep));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-size: .95rem; font-weight: 600; color: var(--ink); }
    .chat-header-sub { font-size: .72rem; color: var(--rose); }
    .chat-header-actions { display: flex; gap: .5rem; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
      transition: all .18s; color: var(--ink);
    }
    .icon-btn:hover { background: var(--warm); border-color: var(--blush); }

    /* ── Messages ── */
    .messages {
      flex: 1; overflow-y: auto; padding: 1.5rem;
      display: flex; flex-direction: column; gap: .75rem;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--blush); border-radius: 2px; }
    .msg-row { display: flex; gap: .75rem; align-items: flex-end; max-width: 78%; }
    .msg-row.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: .9rem;
    }
    .msg-avatar.bot { background: linear-gradient(135deg, var(--rose), var(--deep)); }
    .msg-avatar.user { background: var(--warm); border: 1px solid var(--blush); }
    .msg-body { display: flex; flex-direction: column; gap: .25rem; }
    .msg-row.user .msg-body { align-items: flex-end; }
    .bubble {
      padding: .75rem 1rem; border-radius: var(--r); font-size: .875rem;
      line-height: 1.55; max-width: 100%;
    }
    .bubble.bot { background: #fff; border: 1px solid var(--border); color: var(--ink); border-bottom-left-radius: 4px; }
    .bubble.bot.sucesso { border-left: 3px solid var(--sage); background: #f0f7f0; }
    .bubble.bot.erro { border-left: 3px solid #e05555; background: #fff5f5; }
    .bubble.bot.alerta { border-left: 3px solid var(--alert); background: #fff8f0; }
    .bubble.user { background: var(--ink); color: var(--cream); border-bottom-right-radius: 4px; }
    .msg-time { font-size: .65rem; color: rgba(26,16,24,.35); padding: 0 .25rem; }
    .opts-row { display: flex; flex-wrap: wrap; gap: .4rem; padding-left: 44px; margin-top: .15rem; }
    .opt-chip {
      padding: .35rem .8rem; border-radius: 20px; font-size: .75rem; cursor: pointer;
      border: 1px solid var(--blush); background: #fff; color: var(--deep);
      font-family: 'DM Sans', sans-serif; transition: all .18s;
    }
    .opt-chip:hover { background: var(--blush); color: var(--deep); }

    /* ── Typing indicator ── */
    .typing-row { align-items: center; }
    .typing-bubble {
      background: #fff; border: 1px solid var(--border);
      border-radius: var(--r); border-bottom-left-radius: 4px;
      padding: .75rem 1rem; display: flex; gap: .3rem; align-items: center;
    }
    .dot-t {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--blush); animation: bounce .9s infinite;
    }
    .dot-t:nth-child(2) { animation-delay: .15s; }
    .dot-t:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* ── Input area ── */
    .input-area {
      padding: 1rem 1.5rem; border-top: 1px solid var(--border);
      background: #fff; flex-shrink: 0;
      display: flex; gap: .75rem; align-items: flex-end;
    }
    .input-wrap { flex: 1; position: relative; }
    #inputMsg {
      width: 100%; padding: .75rem 1rem; border-radius: 12px;
      border: 1px solid var(--border); background: var(--surface);
      font-family: 'DM Sans', sans-serif; font-size: .875rem; color: var(--ink);
      resize: none; outline: none; transition: border-color .18s;
      min-height: 44px; max-height: 100px; overflow-y: auto; line-height: 1.5;
    }
    #inputMsg:focus { border-color: var(--rose); }
    #inputMsg::placeholder { color: rgba(26,16,24,.35); }
    #sendBtn {
      width: 44px; height: 44px; border-radius: 12px; border: none;
      background: var(--ink); color: var(--cream); cursor: pointer;
      font-size: 1rem; flex-shrink: 0; transition: all .18s;
      display: flex; align-items: center; justify-content: center;
    }
    #sendBtn:hover:not(:disabled) { background: var(--deep); }
    #sendBtn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Tables inside bubbles ── */
    .bubble table { width: 100%; border-collapse: collapse; margin-top: .5rem; font-size: .8rem; }
    .bubble th, .bubble td { padding: .4rem .6rem; border: 1px solid var(--border); text-align: left; }
    .bubble th { background: var(--warm); font-weight: 600; }

    /* ── Modal histórico ── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(26,16,24,.5);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #fff; border-radius: var(--r); padding: 1.5rem;
      max-width: 480px; width: 90%; max-height: 70vh;
      display: flex; flex-direction: column; gap: 1rem;
      box-shadow: var(--shadow);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 1rem; font-weight: 600; }
    .modal-close { background: none; border: none; cursor: pointer; font-size: 1.1rem; color: var(--ink); }
    .modal-body { overflow-y: auto; flex: 1; }
    .hist-item {
      padding: .5rem .75rem; border-radius: 8px; font-size: .78rem;
      background: var(--surface); border: 1px solid var(--border);
      margin-bottom: .4rem; color: var(--ink);
    }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .sidebar { padding: 1rem; }
      .quick-list { flex-direction: row; flex-wrap: wrap; }
      .quick-list li { flex: 1 1 45%; }
    }
  </style>
</head>
<body>
<div class="shell">
  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-tag">e-commerce</div>
      <div class="brand-name">Fashion<em>Flow</em></div>
      <div class="brand-sector">Setor Financeiro</div>
    </div>
    <div class="sidebar-sep"></div>
    <div class="quick-title">Acesso Rápido</div>
    <ul class="quick-list">
      <li><button onclick="enviarOpcao('Formas de pagamento')"><span class="qi">💳</span> Formas de pagamento</button></li>
      <li><button onclick="enviarOpcao('Estorno / Reembolso')"><span class="qi">🔄</span> Estorno / Reembolso</button></li>
      <li><button onclick="enviarOpcao('Nota Fiscal')"><span class="qi">🧾</span> Nota Fiscal</button></li>
      <li><button onclick="enviarOpcao('Calcular Frete')"><span class="qi">🚚</span> Calcular Frete</button></li>
      <li><button onclick="enviarOpcao('Segunda Via Boleto')"><span class="qi">📄</span> Segunda Via Boleto</button></li>
      <li><button onclick="enviarOpcao('Negociar Dívida')"><span class="qi">📋</span> Negociar Dívida</button></li>
      <li><button onclick="enviarOpcao('Status Pagamento')"><span class="qi">🔍</span> Status Pagamento</button></li>
      <li><button onclick="enviarOpcao('Consultar Imposto')"><span class="qi">🏛️</span> Consultar Imposto</button></li>
    </ul>
    <div class="sidebar-bottom">
      <div class="status-dot"><span class="dot"></span> Bot online · Setor Financeiro</div>
      <button class="reset-btn" onclick="resetarConversa()">↺ Nova conversa</button>
    </div>
  </aside>

  <!-- ── Chat area ── -->
  <main class="chat-area">
    <header class="chat-header">
      <div class="chat-avatar">🤖</div>
      <div class="chat-header-info">
        <div class="chat-header-name">Assistente Financeiro</div>
        <div class="chat-header-sub">FashionFlow · Online agora</div>
      </div>
      <div class="chat-header-actions">
        <button class="icon-btn" title="Histórico" onclick="abrirHistorico()">📋</button>
        <button class="icon-btn" title="Nova conversa" onclick="resetarConversa()">↺</button>
      </div>
    </header>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="inputMsg"
          placeholder="Digite sua mensagem…"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
      </div>
      <button id="sendBtn" onclick="enviar()" title="Enviar">➤</button>
    </div>
  </main>
</div>

<!-- ── Modal Histórico ── -->
<div class="modal-bg" id="modalBg" onclick="fecharHistorico(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📋 Histórico do Atendimento</span>
      <button class="modal-close" onclick="fecharHistorico()">✕</button>
    </div>
    <div class="modal-body" id="histContent">
      <p style="font-size:.8rem;color:rgba(26,16,24,.4)">Nenhum evento registrado ainda.</p>
    </div>
  </div>
</div>

<script>
  // ── Markdown renderer (minimal) ──
  function md(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/_(.*?)_/g, '<em>$1</em>')
      .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^/, '<p>').replace(/$/, '</p>')
      // Table support
      .replace(/<p>\|(.*)<\/p>/g, (m) => {
        const rows = m.replace(/<\/?p>/g,'').trim().split('<br>').filter(r => r.trim());
        let html = '<table>';
        rows.forEach((row, i) => {
          if (/^\|[-| ]+\|$/.test(row.trim())) return;
          const cells = row.split('|').filter((_,j) => j > 0 && j < row.split('|').length - 1);
          const tag = i === 0 ? 'th' : 'td';
          html += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
        });
        return html + '</table>';
      });
  }

  // ── Hora atual (fallback local, caso o backend não retorne) ──
  function horaAtual() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  // ── Add bot message ──
  function addBotMsg(text, tipo, opcoes, timestamp) {
    const msgs = document.getElementById('messages');
    const typing = document.getElementById('typing');
    if (typing) typing.remove();

    // CORREÇÃO: usar timestamp do servidor; se ausente, usar hora local
    const time = (timestamp && timestamp !== 'undefined') ? timestamp : horaAtual();

    const row = document.createElement('div');
    row.className = 'msg-row';
    row.innerHTML = `
      <div class="msg-avatar bot">🤖</div>
      <div class="msg-body">
        <div class="bubble bot ${tipo || ''}">${md(text)}</div>
        <span class="msg-time">${time}</span>
      </div>`;
    msgs.appendChild(row);

    if (opcoes && opcoes.length) {
      const optsRow = document.createElement('div');
      optsRow.className = 'opts-row';
      opcoes.forEach(op => {
        const btn = document.createElement('button');
        btn.className = 'opt-chip';
        btn.textContent = op;
        btn.onclick = () => enviarOpcao(op);
        optsRow.appendChild(btn);
      });
      msgs.appendChild(optsRow);
    }
    msgs.scrollTop = msgs.scrollHeight;
  }

  // ── Add user message ──
  function addUserMsg(text, time) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="msg-avatar user">👤</div>
      <div class="msg-body">
        <div class="bubble user">${text.replace(/</g, '&lt;')}</div>
        <span class="msg-time">${time}</span>
      </div>`;
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  // ── Typing indicator ──
  function showTyping() {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.id = 'typing';
    row.className = 'msg-row typing-row';
    row.innerHTML = `
      <div class="msg-avatar bot">🤖</div>
      <div class="typing-bubble">
        <div class="dot-t"></div><div class="dot-t"></div><div class="dot-t"></div>
      </div>`;
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  // ── Enviar mensagem ──
  async function enviar(texto) {
    const input = document.getElementById('inputMsg');
    const msg = (texto !== undefined ? texto : input.value).trim();
    if (!msg) return;
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    const now = horaAtual();
    addUserMsg(msg, now);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensagem: msg }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      // CORREÇÃO: garantir que todos os campos existam com fallbacks seguros
      addBotMsg(
        data.resposta  || 'Desculpe, ocorreu um erro.',
        data.tipo      || 'info',
        data.opcoes    || [],
        data.timestamp || horaAtual()   // <-- fallback local se backend não retornar
      );
    } catch (e) {
      addBotMsg('⚠️ Erro de conexão. Tente novamente.', 'erro', [], horaAtual());
    }

    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  function enviarOpcao(op) { enviar(op); }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  // ── Reset ──
  async function resetarConversa() {
    try {
      await fetch('/api/reset', { method: 'POST' });
    } catch (_) {}
    document.getElementById('messages').innerHTML = '';
    setTimeout(() => enviarOpcao('Olá'), 200);
  }

  // ── Histórico ──
  async function abrirHistorico() {
    try {
      const res = await fetch('/api/historico');
      const data = await res.json();
      const el = document.getElementById('histContent');
      if (!data.historico || !data.historico.length) {
        el.innerHTML = '<p style="font-size:.8rem;color:rgba(26,16,24,.4)">Nenhum evento registrado ainda.</p>';
      } else {
        el.innerHTML = data.historico.map(h => `<div class="hist-item">${h}</div>`).join('');
      }
    } catch (_) {
      document.getElementById('histContent').innerHTML =
        '<p style="font-size:.8rem;color:#e05555">Erro ao carregar histórico.</p>';
    }
    document.getElementById('modalBg').classList.add('open');
  }

  function fecharHistorico(e) {
    if (!e || e.target === document.getElementById('modalBg') || !e.target) {
      document.getElementById('modalBg').classList.remove('open');
    }
  }

  // ── Boot: mensagem de boas-vindas automática ──
  window.onload = () => {
    setTimeout(() => enviarOpcao('Olá'), 400);
    document.getElementById('inputMsg').focus();
  };
</script>
</body>
</html>
