<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FashionFlow · Financeiro</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>

  <!-- Styles -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>

  <!-- Styles CSS -->
  <style>
    *, 
    *::before, 
    *::after { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    :root {
      --ink:       #1a1018;
      --cream:     #f5f0e8;
      --warm:      #ede5d0;
      --blush:     #e8c4b0;
      --rose:      #c9856a;
      --deep:      #7a3b2e;
      --sage:      #6b8c6e;
      --alert:     #c4793a;
      --surface:   #faf7f2;
      --border:    rgba(26,16,24,.10);
      --shadow:    0 4px 32px rgba(26,16,24,.10);
      --r:         16px;
    }

    html, body {
      height: 100%;
      color: var(--ink);
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
    }

    /* --------- Layout --------- */
    .shell {
      display: grid;
      margin: 0 auto;
      max-width: 1100px;
      grid-template-rows: 100vh;
      grid-template-columns: 280px 1fr;
      box-shadow: 0 0 80px rgba(26,16,24,.15);
    }

    /* --------- Sidebar --------- */
    .sidebar {
      overflow: hidden;
      position: relative;
      color: var(--cream);
      padding: 2rem 1.5rem;
      background: var(--ink);

      display: flex;
      flex-direction: column;
    }
    .sidebar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 80%, rgba(201,133,106,.2) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(107,140,110,.12) 0%, transparent 50%);
      pointer-events: none;
    }

    .brand {
      margin-bottom: 2.5rem;
    }

    .brand-tag {
      font-size: .65rem;
      color: var(--blush);
      margin-bottom: .4rem;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .brand-name {
      line-height: 1;
      font-size: 1.9rem;
      color: var(--cream);
      font-family: 'DM Serif Display', serif;
    }

    .brand-name em {
      font-style: italic;
      color: var(--blush);
    }

    .brand-sector {
      font-size: .72rem;
      margin-top: .5rem;
      color: var(--rose);
      letter-spacing: .1em;
      text-transform: uppercase;

      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .brand-sector::before {
      content: '';
      display: inline-block;
      background: var(--rose);
      width: 20px; height: 1px;
    }

    .sidebar-sep {
      height: 1px;
      margin: 1.5rem 0;
      background: rgba(245,240,232,.08);
    }

    .quick-title {
      font-size: .6rem;
      margin-bottom: .8rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(245,240,232,.4);
    }
    .quick-list {
      display: flex;
      list-style: none;
      flex-direction: column;
      gap: .35rem;
    }
    .quick-list li button {
      width: 100%;
      cursor: pointer;
      text-align: left;
      font-size: .78rem;
      border-radius: 8px;
      transition: all .18s;
      padding: .55rem .85rem;
      color: rgba(245,240,232,.75);
      font-family: 'DM Sans', sans-serif;
      background: rgba(245,240,232,.05);
      border: 1px solid rgba(245,240,232,.08);

      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .quick-list li button:hover {
      color: var(--cream);
      transform: translateX(3px);
      background: rgba(201,133,106,.18);
      border-color: rgba(201,133,106,.3);
    }

    .quick-list li button .qi {
      flex-shrink: 0;
      font-size: 1rem;
    }

    .sidebar-bottom {
      margin-top: auto;
    }

    .reset-btn {
      width: 100%;
      padding: .7rem;
      cursor: pointer;
      font-size: .72rem;
      border-radius: 8px;
      transition: all .2s;
      letter-spacing: .06em;
      background: transparent;
      color: rgba(245,240,232,.45);
      font-family: 'DM Sans', sans-serif;
      border: 1px solid rgba(245,240,232,.12);
    }

    .reset-btn:hover {
      color: var(--rose);
      border-color: rgba(201,133,106,.4);
    }

    .status-dot {
      font-size: .7rem;
      margin-bottom: .75rem;
      color: rgba(245,240,232,.35);

      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .dot {
      width: 7px; 
      height: 7px;
      border-radius: 50%;
      background: var(--sage);
      animation: pulse 2s infinite;
      box-shadow: 0 0 6px var(--sage);
    }

    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: .4; }
    }

    /* --------- Chat area --------- */
    .chat-area {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      height: 100vh;
    }

    .chat-header {
      padding: 1.4rem 2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);

      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .avatar {
      width: 42px; 
      height: 42px;
      flex-shrink: 0;
      font-size: 1.1rem;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rose), var(--deep));

      display: flex; 
      align-items: center; 
      justify-content: center;
    }

    .chat-header-info h2 {
      color: var(--ink);
      font-size: 1.05rem;
      font-family: 'DM Serif Display', serif;
    }

    .chat-header-info p {
      font-size: .72rem;
      color: rgba(26,16,24,.45);
    }

    .header-actions { 
      margin-left: auto; 
      display: flex; 
      gap: .5rem; 
    }

    .icon-btn {
      width: 34px; 
      height: 34px;
      cursor: pointer;
      font-size: .9rem;
      border-radius: 8px;
      transition: all .15s;
      background: transparent;
      color: rgba(26,16,24,.5);
      border: 1px solid var(--border);

      display: flex; 
      align-items: center; 
      justify-content: center;
    }

    .icon-btn:hover { 
      color: var(--ink); 
      background: var(--warm); 
    }

    /* --------- Messages --------- */
    .messages {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
      scroll-behavior: smooth;

      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--blush); border-radius: 4px; }

    .msg-row {
      display: flex;
      gap: .75rem;
      animation: fadeUp .3s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(10px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; 
      height: 32px;
      flex-shrink: 0;
      margin-top: 2px;
      font-size: .85rem;
      border-radius: 50%;

      display: flex; 
      align-items: center; 
      justify-content: center;
    }

    .msg-avatar.user { background: var(--warm); color: var(--ink); }
    .msg-avatar.bot  { background: linear-gradient(135deg,var(--rose),var(--deep)); color: #fff; }

    .msg-row.user .msg-body { align-items: flex-end; }
    .msg-body { max-width: 72%; display: flex; flex-direction: column; gap: .4rem; }

    .bubble {
      line-height: 1.55;
      font-size: .875rem;
      padding: .8rem 1rem;
      word-break: break-word;
      border-radius: var(--r);
    }

    .bubble.bot {
      background: #fff;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(26,16,24,.06);
    }

    .bubble.user {
      color: var(--cream);
      background: var(--ink);
      border-bottom-right-radius: 4px;
    }

    /* tipo colorido */
    .bubble.bot.error   { border-left: 3px solid #b94040; }
    .bubble.bot.success { border-left: 3px solid var(--sage); }
    .bubble.bot.warning { border-left: 3px solid var(--alert); }

    .bubble strong { font-weight: 600; }
    .bubble .user em { color: rgba(245,240,232,.6); }
    .bubble em { font-style: italic; color: rgba(26,16,24,.55); }

    /* markdown table */
    .bubble table { width: 100%; border-collapse: collapse; font-size: .8rem; margin-top: .5rem; }
    .bubble th, .bubble td { padding: .4rem .6rem; text-align: left; border-bottom: 1px solid var(--border); }
    .bubble th { background: var(--warm); font-weight: 600; }

    .msg-time {
      padding: 0 .2rem;
      font-size: .65rem;
      color: rgba(26,16,24,.3);
    }

    /* --------- Quick options --------- */
    .opts-row {
      padding-left: 44px;
      margin-top: -.4rem;

      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
    }

    .opt-chip {
      cursor: pointer;
      color: var(--ink);
      font-size: .75rem;
      white-space: nowrap;
      transition: all .15s;
      border-radius: 100px;
      padding: .35rem .85rem;
      background: var(--warm);
      font-family: 'DM Sans', sans-serif;
      border: 1px solid rgba(26,16,24,.12);
    }

    .opt-chip:hover { 
      background: var(--blush); 
      border-color: var(--rose); 
    }

    /* --------- Typing indicator --------- */
    .typing-row { display: flex; align-items: center; gap: .75rem; }

    .typing-bubble {
      background: #fff;
      padding: .8rem 1.1rem;
      border-radius: var(--r);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);

      display: flex; 
      align-items: center;
      gap: 4px; 
    }

    .dot-t {
      border-radius: 50%;
      width: 6px; height: 6px;
      background: var(--blush);
      animation: bounce .9s infinite;
    }
    .dot-t:nth-child(2) { animation-delay: .15s; }
    .dot-t:nth-child(3) { animation-delay: .3s; }

    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-5px); }
    }

    /* --------- Input bar --------- */
    .input-bar {
      padding: 1rem 2rem 1.4rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      background: #fff;
      border-radius: 14px;
      transition: border-color .2s;
      padding: .6rem .6rem .6rem 1rem;
      border: 1.5px solid var(--border);

      display: flex;
      align-items: flex-end;
      gap: .6rem;
    }

    .input-wrap:focus-within {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(201,133,106,.12);
    }

    .input-wrap textarea {
      flex: 1;
      border: none;
      resize: none;
      outline: none;
      line-height: 1.5;
      color: var(--ink);
      max-height: 100px;
      font-size: .875rem;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    .input-wrap textarea::placeholder { color: rgba(26,16,24,.3); }

    .send-btn {
      width: 38px; 
      height: 38px;
      border: none;
      flex-shrink: 0;
      font-size: 1rem;
      cursor: pointer;
      color: var(--cream);
      border-radius: 10px;
      transition: all .15s;
      background: var(--ink);

      display: flex; 
      align-items: center; 
      justify-content: center;
    }

    .send-btn:hover { background: var(--deep); transform: scale(1.05); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* --------- History modal --------- */
    .modal-bg {
      inset: 0;
      opacity: 0; 
      z-index: 100;
      position: fixed; 
      pointer-events: none;
      transition: opacity .2s;
      backdrop-filter: blur(4px);
      background: rgba(26,16,24,.5);

      display: flex; 
      align-items: center; 
      justify-content: center;
    }

    .modal-bg.open { opacity: 1; pointer-events: all; }

    .modal {
      width: 460px;
      padding: 2rem;
      max-height: 70vh;
      overflow-y: auto;
      border-radius: 18px;
      box-shadow: var(--shadow);
      transition: transform .25s;
      background: var(--surface);
      transform: translateY(20px);
    }

    .modal-bg.open .modal { transform: translateY(0); }

    .modal h3 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      font-family: 'DM Serif Display', serif;
    }

    .hist-item {
      padding: .45rem 0;
      font-size: .78rem;
      color: rgba(26,16,24,.65);
      border-bottom: 1px solid var(--border);

      display: flex; 
      align-items: flex-start;
      gap: .5rem;  
    }

    .hist-item::before { content: '→'; color: var(--rose); flex-shrink: 0; }

    .modal-close {
      cursor: pointer;
      margin-top: 1.2rem;
      padding: .6rem 1.4rem;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      background: var(--ink); color: var(--cream);
    }

    @media (max-width: 700px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

  <div class="shell">
  
    <!-- --------- Sidebar --------- -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-tag">e-commerce</div>
        <div class="brand-name">Fashion<em>Flow</em></div>
        <div class="brand-sector">Setor Financeiro</div>
      </div>
  
      <div class="sidebar-sep"></div>
      <div class="quick-title">Acesso Rápido</div>
  
      <ul class="quick-list">
        <li><button onclick="enviarOpcao('Formas de pagamento')"><span class="qi">💳</span>Formas de pagamento</button></li>
        <li><button onclick="enviarOpcao('Estorno e reembolso')"><span class="qi">🔄</span>Estorno / Reembolso</button></li>
        <li><button onclick="enviarOpcao('Nota fiscal')"><span class="qi">🧾</span>Nota Fiscal</button></li>
        <li><button onclick="enviarOpcao('Calcular frete')"><span class="qi">🚚</span>Calcular Frete</button></li>
        <li><button onclick="enviarOpcao('Segunda via boleto')"><span class="qi">📄</span>Segunda Via Boleto</button></li>
        <li><button onclick="enviarOpcao('Negociar dívida')"><span class="qi">📋</span>Negociar Dívida</button></li>
        <li><button onclick="enviarOpcao('Status do pagamento')"><span class="qi">🔍</span>Status Pagamento</button></li>
        <li><button onclick="enviarOpcao('Consultar imposto')"><span class="qi">🏛️</span>Consultar Imposto</button></li>
      </ul>
  
      <div class="sidebar-sep"></div>
      
      <div class="sidebar-bottom">
        <div class="status-dot"><span class="dot"></span>Bot online · Setor Financeiro</div>
        <button class="reset-btn" onclick="resetarConversa()">↺ Nova conversa</button>
      </div>
    </aside>
  
    <!-- --------- Chat --------- -->
    <section class="chat-area">
      <header class="chat-header">
        <div class="avatar">🤖</div>
        <div class="chat-header-info">
          <h2>Assistente Financeiro</h2>
          <p>FashionFlow · Online agora</p>
        </div>
  
        <div class="header-actions">
          <button class="icon-btn" title="Histórico" onclick="abrirHistorico()">📋</button>
          <button class="icon-btn" title="Nova conversa" onclick="resetarConversa()">↺</button>
        </div>
      </header>
  
      <div class="messages" id="messages"></div>
  
      <div class="input-bar">
        <div class="input-wrap">
          <textarea id="inputMsg" rows="1" placeholder="Digite sua mensagem…" 
                    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="enviar()">➤</button>
        </div>
      </div>
    </section>
  </div>
  
  <!-- --------- History modal --------- -->
  <div class="modal-bg" id="modalBg" onclick="fecharHistorico(event)">
    <div class="modal">
      <h3>📋 Histórico do Atendimento</h3>
      <div id="histContent"><p style="font-size:.8rem;color:rgba(26,16,24,.4)">Nenhum evento registrado ainda.</p></div>
      <button class="modal-close" onclick="fecharHistorico()">Fechar</button>
    </div>
  </div>

<script>
  // --------- Markdown renderer (minimal) ---------
  function md(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/_(.*?)_/g, '<em>$1</em>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^/, '<p>').replace(/$/, '</p>')
      // Table support
      .replace(/<p>\|(.*)<\/p>/g, (m) => {
        const rows = m.replace(/<\/?p>/g,'').trim().split('<br>').filter(r => r.trim());
        let html = '<table>';

        rows.forEach((row, i) => {
          if(/^\|[-| ]+\|$/.test(row.trim())) return;

          const cells = row.split('|').filter((_,j) => j > 0 && j < row.split('|').length-1);
          const tag = i === 0 ? 'th' : 'td';

          html += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
        });

        return html + '</table>';
      });
  }

  // --------- Add bot message ---------
  function addBotMsg(text, tipo, opcoes, time) {
    const msgs = document.getElementById('messages');
    
    // Remove typing indicator
    const typing = document.getElementById('typing');
    
    if(typing) typing.remove();

    const row = document.createElement('div');
    row.className = 'msg-row';
    row.innerHTML = `
      <div class="msg-avatar bot">🤖</div>
      <div class="msg-body">
        <div class="bubble bot ${tipo||''}">${md(text)}</div>
        <span class="msg-time">${time}</span>
      </div>`;
    msgs.appendChild(row);

    if(opcoes && opcoes.length) {
      const optsRow = document.createElement('div');
      optsRow.className = 'opts-row';

      opcoes.forEach(op => {
        const btn = document.createElement('button');
        btn.className = 'opt-chip';
        btn.textContent = op;
        btn.onclick = () => enviarOpcao(op);
        optsRow.appendChild(btn);
      });
      
      msgs.appendChild(optsRow);
    }

    msgs.scrollTop = msgs.scrollHeight;
  }

  // --------- Add user message ---------
  function addUserMsg(text, time) {
    const msgs = document.getElementById('messages');
    
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="msg-avatar user">👤</div>
      <div class="msg-body">
        <div class="bubble user">${text.replace(/</g,'&lt;')}</div>
        <span class="msg-time">${time}</span>
      </div>`;

    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  // --------- Typing indicator ---------
  function showTyping() {
    const msgs = document.getElementById('messages');
    
    const row = document.createElement('div');
    row.id = 'typing';
    row.className = 'msg-row typing-row';

    row.innerHTML = `
      <div class="msg-avatar bot">🤖</div>
      <div class="typing-bubble">
        <div class="dot-t"></div><div class="dot-t"></div><div class="dot-t"></div>
      </div>`;

    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  // --------- Send ---------
  async function enviar(texto) {
    const input = document.getElementById('inputMsg');
    const msg = (texto || input.value).trim();

    if(!msg) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    const now = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

    addUserMsg(msg, now);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({mensagem: msg})
      });

      const data = await res.json();

      addBotMsg(data.resposta, data.tipo, data.opcoes, data.timestamp);
    } catch(e) {
      addBotMsg('⚠️ Erro de conexão. Tente novamente.', 'error', [], now);
    }

    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  function enviarOpcao(op) { enviar(op); }

  function handleKey(e) {
    if(e.key === 'Enter' && !e.shiftKey) { 
      e.preventDefault(); 
      enviar(); 
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  // --------- Reset ---------
  async function resetarConversa() {
    await fetch('/api/reset', {method:'POST'});

    document.getElementById('messages').innerHTML = '';

    setTimeout(() => enviarOpcao('Olá'), 200);
  }

  // --------- Histórico ---------
  async function abrirHistorico() {
    const res = await fetch('/api/historico');
    const data = await res.json();
    const el = document.getElementById('histContent');

    !data.historico.length
      ? el.innerHTML = '<p style="font-size:.8rem;color:rgba(26,16,24,.4)">Nenhum evento registrado ainda.</p>'
      : el.innerHTML = data.historico.map(h => `<div class="hist-item">${h}</div>`).join('');
    
    document.getElementById('modalBg').classList.add('open');
  }

  function fecharHistorico(e) {
    if(!e || e.target === document.getElementById('modalBg') || !e.target) 
      document.getElementById('modalBg').classList.remove('open');
  }

  // --------- Boot ---------
  window.onload = () => {
    setTimeout(() => enviarOpcao('Olá'), 400);
    document.getElementById('inputMsg').focus();
  };

</script>
</body>
</html>
